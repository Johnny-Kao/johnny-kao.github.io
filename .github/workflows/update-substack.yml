name: Update Substack Content

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: write

jobs:
  update-substack-content:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip substack]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch Substack JSON from Worker
        continue-on-error: true
        run: |
          mkdir -p .cache
          curl --fail --silent --show-error --location \
            --retry 4 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 90 \
            -H "Accept: application/json, text/plain;q=0.9, */*;q=0.8" \
            "https://substack-feed-worker.at12885.workers.dev/substack.json" \
            -o .cache/substack-feed.json

      - name: Generate substack.json
        env:
          SUBSTACK_FEED_FILE: .cache/substack-feed.json
          SUBSTACK_JSON_URL: https://substack-feed-worker.at12885.workers.dev/substack.json
        run: node scripts/generate-substack-json.js

      - name: Render articles into index.html
        run: node scripts/render-articles-into-index.js

      - name: Detect content changes
        id: changes
        run: |
          if git diff --quiet -- data/substack.json index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update sitemap lastmod
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/update-sitemap-lastmod.js

      - name: Notify IndexNow
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/notify-indexnow.js

      - name: Update substack sync meta
        env:
          CONTENT_CHANGED: ${{ steps.changes.outputs.changed }}
          SUBSTACK_JSON_URL: https://substack-feed-worker.at12885.workers.dev/substack.json
        run: node scripts/update-substack-sync-meta.js

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data/substack.json index.html sitemap.xml data/substack-sync.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/substack.json index.html sitemap.xml data/substack-sync.json
          git commit -m "chore: update substack content [skip substack]"
          git push
