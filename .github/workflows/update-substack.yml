name: Update Substack Content

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  update-substack-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate substack.json
        run: node scripts/generate-substack-json.js

      - name: Render articles into index.html
        run: node scripts/render-articles-into-index.js

      - name: Detect content changes
        id: changes
        run: |
          if git diff --quiet -- data/substack.json index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update sitemap lastmod
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/update-sitemap-lastmod.js

      - name: Notify IndexNow
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/notify-indexnow.js

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data/substack.json index.html sitemap.xml; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/substack.json index.html sitemap.xml
          git commit -m "chore: update substack content"
          git push
